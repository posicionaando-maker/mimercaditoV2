<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2d6a4f">
    <title>MiMercadito POS</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app">
        <!-- HEADER COMPACTO CON RESÚMENES -->
        <header class="header">
            <h1>🌱 MiMercadito</h1>
            <div class="resumen">
                <div class="resumen-item">📅 Hoy: <strong id="ventasHoy">$0</strong></div>
                <div class="resumen-item">💰 Efectivo: <strong id="efectivoHoy">$0</strong></div>
                <div class="resumen-item">📱 Transfer: <strong id="transferHoy">$0</strong></div>
                <div class="resumen-item">📆 Mes: <strong id="ventasMes">$0</strong></div>
            </div>
        </header>

        <!-- TABS (NAVEGACIÓN PRINCIPAL) -->
        <nav class="tabs">
            <button class="tab active" data-tab="pos">🛒 POS</button>
            <button class="tab" data-tab="inventario">📦 Inventario</button>
            <button class="tab" data-tab="datos">📁 Datos</button>
        </nav>

        <!-- ========== PANTALLA POS ========== -->
        <div id="pos" class="tab-content active">
            <!-- Buscador -->
            <div class="buscador-container">
                <input type="text" id="buscarProducto" placeholder="🔍 Buscar producto por nombre..." autocomplete="off">
                <div id="sugerencias" class="sugerencias"></div>
            </div>

            <!-- Carrito y Pago en dos columnas (en desktop) -->
            <div class="pos-doble-columna">
                <!-- Carrito -->
                <div class="carrito-container">
                    <h3>🛍️ Carrito</h3>
                    <div id="carrito-lista" class="carrito-lista"></div>
                    <div class="carrito-total">Total: <strong>$<span id="totalCarrito">0</span></strong></div>
                </div>

                <!-- Pago -->
                <div class="pago-container">
                    <h3>💸 Cobro</h3>
                    <div class="campo">
                        <label>💵 Efectivo:</label>
                        <input type="number" id="pagoEfectivo" value="0" step="1">
                    </div>
                    <div class="campo">
                        <label>📱 Transferencia:</label>
                        <input type="number" id="pagoTransferencia" value="0" step="1">
                    </div>
                    <div class="total-pagado">Total pagado: <strong>$<span id="totalPagado">0</span></strong></div>
                    <div id="vuelto-info" class="vuelto-info"></div>
                    <button id="btnCobrar" class="btn-cobrar">✔️ COBRAR VENTA</button>
                </div>
            </div>
        </div>

        <!-- ========== PANTALLA INVENTARIO ========== -->
        <div id="inventario" class="tab-content">
            <div class="inventario-header">
                <input type="text" id="filtroCategoria" placeholder="🔍 Filtrar por categoría...">
                <button id="btnNuevoProducto" class="btn-nuevo">+ Nuevo</button>
            </div>
            <div id="listaInventario" class="lista-inventario"></div>
        </div>

        <!-- ========== PANTALLA DATOS ========== -->
        <div id="datos" class="tab-content">
            <div class="datos-grid">
                <div class="card">
                    <h3>📤 Exportar</h3>
                    <button id="btnExportar" class="btn-secundario">Guardar JSON</button>
                    <button id="btnWhatsApp" class="btn-secundario">📱 WhatsApp</button>
                </div>
                <div class="card">
                    <h3>📥 Importar</h3>
                    <button id="btnSeleccionarArchivo" class="btn-secundario">Seleccionar archivo</button>
                    <input type="file" id="archivoImportar" accept=".json" style="display:none">
                </div>
                <div class="card">
                    <h3>🌐 Sincronizar</h3>
                    <input type="url" id="urlGitHub" placeholder="URL del JSON público">
                    <button id="btnImportarUrl" class="btn-secundario">Importar desde URL</button>
                </div>
            </div>
            <div id="mensajeSync" class="mensaje-sync"></div>
        </div>
    </div>

    <!-- MODAL PARA PRODUCTO -->
    <div id="modalProducto" class="modal">
        <div class="modal-contenido">
            <span class="cerrar">&times;</span>
            <h3 id="modalTitulo">Agregar Producto</h3>
            <form id="formProducto">
                <input type="hidden" id="productoId">
                <input type="text" id="prodNombre" placeholder="Nombre" required>
                <input type="text" id="prodCategoria" placeholder="Categoría">
                <input type="number" id="prodCantidad" placeholder="Cantidad" value="0" required>
                <input type="number" id="prodCosto" placeholder="Costo $" step="0.01" required>
                <input type="number" id="prodPrecio" placeholder="Precio venta $" step="0.01" required>
                <span id="prodMargen">Margen: 0%</span>
                <button type="submit" class="btn-guardar">Guardar</button>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
