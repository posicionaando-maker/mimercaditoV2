<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mi Mercadito POS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-512.png">
  <meta name="theme-color" content="#1e4a76">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  
  <!-- CABECERA SIMPLIFICADA -->
  <header>
    <h2>🛒 Mi Mercadito POS</h2>
    <!-- Menú hamburguesa para acciones secundarias -->
    <div class="menu-icon" id="menuIcon">☰</div>
  </header>

  <!-- Menú desplegable (oculto por defecto) -->
  <div id="menuSecundario" class="menu-secundario">
    <button id="btnImportarInventario" class="sec">📂 Importar inventario</button>
    <button id="btnExportarInventario" class="sec">📤 Exportar inventario</button>
    <button id="btnExportarVentas" class="sec">📊 Exportar ventas</button>
  </div>

  <!-- PESTAÑAS PRINCIPALES -->
  <div class="tabs">
    <button id="tabVender" class="tab active">🛒 Vender</button>
    <button id="tabReportes" class="tab">📈 Reportes</button>
  </div>

  <!-- PANEL DE VENTAS (PRINCIPAL) -->
  <div id="venderPanel" class="panel active">
    <div class="main-grid">
      <!-- Catálogo -->
      <div class="products">
        <div class="busqueda-container">
          <input type="text" id="buscar" placeholder="🔍 Buscar producto..." class="busqueda-input">
        </div>
        <div id="productList" class="product-list">Cargue inventario.json</div>
      </div>

      <!-- Carrito + Pago -->
      <div class="cart">
        <h3>🧾 Venta actual</h3>
        <div id="cartItems" class="cart-items"></div>
        <div class="total">Total: <strong>$<span id="totalCarrito">0.00</span></strong></div>
        
        <div class="pago-section">
          <div class="pago-campo">
            <label>💰 Efectivo:</label>
            <input type="number" id="efectivo" step="any" value="0" class="pago-input">
          </div>
          <div class="pago-campo">
            <label>📲 Transferencia:</label>
            <input type="number" id="transferencia" step="any" value="0" class="pago-input">
          </div>
          <div id="restanteMsg" class="venta-info"></div>
        </div>

        <div class="cart-buttons">
          <button id="finalizarVenta" class="btn-success" disabled>✅ Finalizar venta</button>
          <button id="limpiarCarrito" class="btn-danger">🗑 Limpiar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PANEL DE REPORTES (SECUNDARIO) -->
  <div id="reportesPanel" class="panel">
    <div class="reportes-container">
      <div class="filtros">
        <label>📅 Mes: <input type="month" id="filtroMes"></label>
        <button id="actualizarReportes" class="btn-actualizar">Actualizar</button>
      </div>
      <div class="reportes-grid">
        <div class="reporte-card">
          <h4>📆 Ventas del día</h4>
          <div id="ventasHoy">-</div>
        </div>
        <div class="reporte-card">
          <h4>💰 Total acumulado (mes)</h4>
          <div id="totalMes">-</div>
        </div>
        <div class="reporte-card">
          <h4>💵 Efectivo</h4>
          <div id="totalEfectivo">-</div>
        </div>
        <div class="reporte-card">
          <h4>📲 Transferencia</h4>
          <div id="totalTransferencia">-</div>
        </div>
        <div class="reporte-card">
          <h4>📈 Ganancia neta (mes)</h4>
          <div id="gananciaNeta">-</div>
        </div>
        <div class="reporte-card">
          <h4>⚠️ Stock bajo (≤3)</h4>
          <div id="stockBajoLista">-</div>
        </div>
        <div class="reporte-card full-width">
          <h4>🏆 Productos más vendidos (mes)</h4>
          <div id="topProductos">-</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="pos.js"></script>
<script>
  // Funcionalidad del menú hamburguesa
  document.getElementById('menuIcon').addEventListener('click', function() {
    const menu = document.getElementById('menuSecundario');
    menu.classList.toggle('mostrar');
  });
</script>
</body>
</html>
