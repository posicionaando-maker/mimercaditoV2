<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- viewport-fit=cover es importante para que la PWA ocupe toda la pantalla en iPhone con notch -->
  
  <title>Mi Mercadito POS</title>
  
  <!-- Archivos de la PWA -->
  <link rel="manifest" href="manifest.json">
  <!-- icono para agregar a pantalla de inicio en iOS -->
  <link rel="apple-touch-icon" href="icon-512.png">
  <!-- color de la barra de estado en Android -->
  <meta name="theme-color" content="#2c3e50">
  
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  
  <!-- CABECERA: siempre visible -->
  <header>
    <h2>🛒 Mi Mercadito POS</h2>
    <div class="header-buttons">
      <!-- Los 3 botones principales de importación/exportación -->
      <button id="btnImportarInventario" class="sec">📂 Importar inventario.json</button>
      <button id="btnExportarInventario" class="sec">📤 Exportar inventario</button>
      <button id="btnExportarVentas" class="sec">📊 Exportar ventas.json</button>
    </div>
  </header>

  <!-- PESTAÑAS: permiten cambiar entre vender y ver reportes -->
  <div class="tabs">
    <button id="tabVender" class="tab active">🛒 Vender</button>
    <button id="tabReportes" class="tab">📈 Reportes</button>
  </div>

  <!-- PANEL DE VENTAS (visible por defecto) -->
  <div id="venderPanel" class="panel active">
    <div class="main-grid">
      
      <!-- COLUMNA IZQUIERDA: catálogo de productos -->
      <div class="products">
        <h3>📦 Productos</h3>
        <!-- Campo de búsqueda en tiempo real -->
        <input type="text" id="buscar" placeholder="🔍 Buscar..." style="width:100%">
        <!-- Aquí se renderizarán dinámicamente los productos -->
        <div id="productList" class="product-list">Cargue inventario.json</div>
      </div>

      <!-- COLUMNA DERECHA: carrito de compras -->
      <div class="cart">
        <h3>🧾 Venta actual</h3>
        <div id="cartItems"></div>
        <div class="total">Total: <strong>$<span id="totalCarrito">0.00</span></strong></div>
        
        <!-- Zona de pago mixto (característica especial para Cuba) -->
        <div class="pago-section">
          <label>💰 Efectivo recibido: $<input type="number" id="efectivo" step="any" value="0"></label>
          <label>💸 Transferencia recibida: $<input type="number" id="transferencia" step="any" value="0"></label>
          <!-- Mensaje dinámico que muestra si falta dinero o cuánto es el cambio -->
          <div id="restanteMsg" class="venta-info"></div>
        </div>

        <div class="cart-buttons">
          <button id="finalizarVenta" class="btn-success" disabled>✅ Finalizar venta</button>
          <button id="limpiarCarrito" class="btn-danger">🗑 Limpiar carrito</button>
        </div>
      </div>
    </div>
  </div>

  <!-- PANEL DE REPORTES (oculto inicialmente) -->
  <div id="reportesPanel" class="panel">
    <div class="reportes-container">
      <!-- Filtro por mes para ver acumulados -->
      <div class="filtros">
        <label>📅 Ver mes: <input type="month" id="filtroMes"></label>
        <button id="actualizarReportes" class="sec">Actualizar</button>
      </div>
      
      <!-- Cuadrícula de indicadores clave -->
      <div class="reportes-grid">
        <div class="reporte-card">
          <h4>📆 Ventas del día</h4>
          <div id="ventasHoy">-</div>
        </div>
        <div class="reporte-card">
          <h4>💰 Total acumulado (mes)</h4>
          <div id="totalMes">-</div>
        </div>
        <div class="reporte-card">
          <h4>💵 Efectivo</h4>
          <div id="totalEfectivo">-</div>
        </div>
        <div class="reporte-card">
          <h4>📲 Transferencia</h4>
          <div id="totalTransferencia">-</div>
        </div>
        <div class="reporte-card">
          <h4>📈 Ganancia neta (mes)</h4>
          <div id="gananciaNeta">-</div>
        </div>
        <div class="reporte-card">
          <h4>⚠️ Stock bajo (≤3)</h4>
          <div id="stockBajoLista">-</div>
        </div>
        <div class="reporte-card full-width">
          <h4>🏆 Productos más vendidos (mes)</h4>
          <div id="topProductos">-</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- JavaScript principal -->
<script src="pos.js"></script>
</body>
</html>
